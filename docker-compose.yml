services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: incidents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d incidents"]
      interval: 5s
      timeout: 5s
      retries: 10

  sample_app:
    build:
      context: ./sample_app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/incidents
    ports:
      - "8000:8000"
    volumes:
      - ./sample_app/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
